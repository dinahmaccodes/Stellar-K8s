---
apiVersion: stellar.org/v1alpha1
kind: StellarNode
metadata:
  name: sim-validator-a
  namespace: stellar-system
spec:
  resourceMeta:
    labels:
      stellar.org/simulator-role: validator-a
  nodeType: Validator
  network: Testnet
  version: "v21.0.0"
  replicas: 1
  storage:
    storageClass: "standard"
    size: "20Gi"
    retentionPolicy: Delete
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  validatorConfig:
    seedSecretRef: sim-validator-a-seed
    enableHistoryArchive: false
